services:
  - type: web
    name: ttb-label-verification-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install uv && uv sync
    startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: ALLOWED_ORIGINS
        sync: false

